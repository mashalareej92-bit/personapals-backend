# Render deployment config for PersonaPals backend.
# This tells Render how to build and run your FastAPI server.
services:
  - type: web
    name: personapals-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MOCK_MODE
        value: "0"
      - key: GROQ_CHAT_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_QUEST_MODEL
        value: llama-3.1-8b-instant
      - key: USE_SAFEGUARD
        value: "0"
      - key: GROQ_API_KEY
        sync: false